      curCol++;

    if (curCol > Z) {
      if (rewindMarker) {

<style>

  .leaflet-control-zoom { border:none !important; box-shadow:none !important; margin:12px !important; }

<body>

  <label for="comments">Коментарі (необов'язково)</label>

<div id="mapwrap" hidden>

<script>
  const $ = s => document.querySelector(s);
  const status = (msg, cls) => { const e = $('#status'); e.className = cls || 'dim'; e.textContent = msg; };

  function fmt(ms) {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    const mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');
    return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
  }
  function clockNow() { return new Date().toLocaleString('uk-UA', { hour12: false }); }
  function hm(ts) { return new Date(ts).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', hour12: false }); }

  // ---- хранилище (безопасно: если недоступно — работаем в памяти) ----
  const store = {
    get(k){ try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k,v){ try { localStorage.setItem(k,v); } catch (e) {} }
  };
  const DAY = 24 * 3600 * 1000;

  // ---- IndexedDB: надёжная "база" на устройстве (localStorage — быстрый кэш) ----
  const DB_NAME = 'kapibara', STORE = 'kv';
  let _dbp = null;
  function openDB() {
    if (_dbp) return _dbp;
    _dbp = new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DB_NAME, 1); } catch (e) { reject(e); return; }
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return _dbp;
  }
  async function idbSet(key, val) {
    try {
      const db = await openDB();
      await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(val, key);
        tx.oncomplete = res; tx.onerror = () => rej(tx.error); tx.onabort = () => rej(tx.error);
      });
    } catch (e) { /* IDB недоступна — остаётся localStorage */ }
  }
  async function idbGet(key) {
    try {
      const db = await openDB();
      return await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readonly');
        const r = tx.objectStore(STORE).get(key);
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    } catch (e) { return undefined; }
  }

  // записи полётов: { t: timestamp, c: коментар }
  function loadFlights() {
    try {
      const arr = JSON.parse(store.get('kap_flights') || '[]');
      return arr.map(x => typeof x === 'number' ? { t: x, c: '' } : { t: x.t, c: x.c || '', lt: x.lt });
    } catch (e) { return []; }
  }
  let flights = loadFlights();
  let activeRec = null;   // полёт, к которому привязан комментарий (до следующего взльоту)

  function saveFlights() {
    const cut = Date.now() - 8 * DAY;   // зберігаємо 8 діб — для тижневого звіту
    flights = flights.filter(f => f.t >= cut);
    store.set('kap_flights', JSON.stringify(flights));
    idbSet('kap_flights', flights);
  }
  function withinDays(n) { const cut = Date.now() - n * DAY; return flights.filter(f => f.t >= cut); }
  function within24() { return withinDays(1); }
  function count24h() { return within24().length; }
  function renderStats() { $('#stats').textContent = 'Вилетів за 24 год: ' + count24h(); }

  // ---- таймер полёта ----
  let flying = false, startTs = 0, tick = null;
  let takeoffStr = '', landingStr = '', lastFlightMs = 0, wakeLock = null;

  function buzz(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
  async function lockScreen() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
  function unlockScreen() { try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {} }

  function renderClock() { $('#clock').textContent = fmt(Date.now() - startTs); }

  function showInfo() {
    const lines = [];
    if (takeoffStr) lines.push('Взліт: ' + takeoffStr);
    if (landingStr) lines.push('Сів: ' + landingStr);
    if (lastFlightMs > 0) lines.push('В полете: ' + fmt(lastFlightMs));
    $('#flight').textContent = lines.length ? lines.join('\n') : 'таймер зупинено';
  }

  function takeoff() {
    flying = true; startTs = Date.now(); takeoffStr = clockNow(); landingStr = ''; lastFlightMs = 0;
    $('#comments').value = '';                  // новый вылет — чистый комментарий
    activeRec = { t: Date.now(), c: '' };        // создаём запись вылета
    flights.push(activeRec); saveFlights(); renderStats();
    $('#clock').classList.add('live');
    $('#takeoff').textContent = 'Сів';
    $('#takeoff').classList.add('flying');
    renderClock(); showInfo();
    tick = setInterval(renderClock, 250);
    lockScreen(); buzz(40);
  }

  function landing() {
    flying = false; clearInterval(tick); tick = null;
    lastFlightMs = Date.now() - startTs; landingStr = clockNow();
    if (activeRec) { activeRec.lt = Date.now(); saveFlights(); }
    // комментарий уже привязан к activeRec через ввод; activeRec остаётся до след. взльоту
    $('#clock').textContent = fmt(lastFlightMs);
    $('#clock').classList.remove('live');
    $('#takeoff').textContent = 'Взліт пішов';
    $('#takeoff').classList.remove('flying');
    showInfo(); unlockScreen(); buzz([40, 60, 40]);
  }

  $('#takeoff').addEventListener('click', () => (flying ? landing() : takeoff()));
  document.addEventListener('visibilitychange', () => { if (flying && document.visibilityState === 'visible') lockScreen(); });

  // ---- привязка комментария к текущему/последнему вылету (до/после посадки) ----
  $('#comments').addEventListener('input', () => {
    if (activeRec) { activeRec.c = $('#comments').value; saveFlights(); }
  });

  // ---- шаблони коментарів ----
  function loadTemplates() {
    try { const v = JSON.parse(store.get('kap_templates') || 'null'); if (Array.isArray(v)) return v; } catch (e) {}
    return ['Зліт штатний', 'Посадка штатна', 'Ціль уражена', 'Скид виконано', 'Втрата відео', 'Втрата звʼязку', 'РЕБ активний'];
  }
  let templates = loadTemplates();
  function saveTemplates() { store.set('kap_templates', JSON.stringify(templates)); idbSet('kap_templates', templates); }

  function insertTemplate(text) {
    const ta = $('#comments');
    const cur = ta.value.trim();
    ta.value = cur ? (cur + ', ' + text) : text;
    ta.dispatchEvent(new Event('input'));   // привязка к вылету + сохранение
    ta.focus();
  }

  let tplEdit = false;
  function renderTemplates() {
    const box = $('#tpls'); box.innerHTML = '';
    box.classList.toggle('editing', tplEdit);
    templates.forEach((t, i) => {
      const b = document.createElement('button');
      b.className = 'tpl';
      b.textContent = tplEdit ? ('✕ ' + t) : t;
      b.addEventListener('click', () => {
        if (tplEdit) { templates.splice(i, 1); saveTemplates(); renderTemplates(); }
        else insertTemplate(t);
      });
      box.appendChild(b);
    });
    const add = document.createElement('button');
    add.className = 'tpl add'; add.textContent = '+';
    add.title = 'Додати шаблон';
    add.addEventListener('click', () => { const e = $('#tpladd'); e.hidden = !e.hidden; if (!e.hidden) $('#tplnew').focus(); });
    box.appendChild(add);
    const ed = document.createElement('button');
    ed.className = 'tpl edit'; ed.textContent = tplEdit ? 'готово' : '✎';
    ed.title = 'Редагувати';
    ed.addEventListener('click', () => { tplEdit = !tplEdit; renderTemplates(); });
    box.appendChild(ed);
  }
  function addTemplate() {
    const v = $('#tplnew').value.trim();
    if (!v) return;
    if (!templates.includes(v)) templates.push(v);
    saveTemplates();
    $('#tplnew').value = ''; $('#tpladd').hidden = true;
    renderTemplates();
  }
  $('#tpladdbtn').addEventListener('click', addTemplate);
  $('#tplnew').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTemplate(); } });
  $('#tpltoggle').addEventListener('click', () => {
    const box = $('#tpls');
    box.hidden = !box.hidden;
    if (box.hidden) { $('#tpladd').hidden = true; tplEdit = false; renderTemplates(); }
    $('#tpltoggle').textContent = box.hidden ? 'Шаблони ▾' : 'Шаблони ▴';
  });
  renderTemplates();

  // ---- название и чекбокс (с запоминанием) ----
  const savedName = store.get('kap_name');
  if (savedName) $('#callsign').value = savedName;
  function nameToggleLabel() {
    const open = !$('#namebox').hidden;
    const nm = $('#callsign').value.trim() || 'Назва';
    $('#nametoggle').textContent = nm + (open ? ' ▴' : ' ▾');
  }
  $('#nametoggle').addEventListener('click', () => { $('#namebox').hidden = !$('#namebox').hidden; nameToggleLabel(); });
  $('#callsign').addEventListener('input', () => { const v = $('#callsign').value; store.set('kap_name', v); idbSet('kap_name', v); nameToggleLabel(); });
  nameToggleLabel();
  let reportMode = store.get('kap_reportmode') || 'current';
  function setMode(m) {
    reportMode = m;
    store.set('kap_reportmode', m); idbSet('kap_reportmode', m);
    document.querySelectorAll('#reportmode button').forEach(b => b.classList.toggle('on', b.dataset.mode === m));
  }
  document.querySelectorAll('#reportmode button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  setMode(reportMode);

  // ---- сборка текста ----
  function buildText() {
    const name = $('#callsign').value.trim();
    const c = $('#comments').value.trim();

    if (reportMode === 'shift') {
      // звіт зміни за 24 год + коментарі привʼязаних вильотів
      const within = within24();
      const lines = [name ? 'Зміна: ' + name : 'Зміна', 'Кількість вилетів: ' + within.length];
      for (const f of within) {
        const tx = (f.c || '').trim();
        if (tx) lines.push(hm(f.lt || f.t) + ' — ' + tx);
      }
      if (c && !activeRec) lines.push(c);
      return lines.join('\n');
    }

    if (reportMode === 'week') {
      // тижневий звіт: підсумок за 7 діб, згруповано по днях
      const within = withinDays(7);
      const lines = [name ? 'Тиждень: ' + name : 'Тиждень', 'Вилетів за 7 днів: ' + within.length];
      const days = new Map();
      for (const f of within) {
        const d = new Date(f.lt || f.t);
        const key = String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0');
        if (!days.has(key)) days.set(key, []);
        days.get(key).push(f);
      }
      for (const k of [...days.keys()].sort((a, b) => days.get(a)[0].t - days.get(b)[0].t)) {
        const arr = days.get(k);
        lines.push(k + ': ' + arr.length);
        for (const f of arr) { const tx = (f.c || '').trim(); if (tx) lines.push('  ' + hm(f.lt || f.t) + ' — ' + tx); }
      }
      if (c && !activeRec) lines.push(c);
      return lines.join('\n');
    }

    const lines = [];
    if (name) lines.push(name);
    if (takeoffStr)       lines.push('*Взліт*: ' + takeoffStr);
    if (c)                lines.push('Коментарі: ' + c);

  let lmap = null, lmarker = null, pickedCoords = '';

  function loadFixed() {

  function conePoints(lat, lng, dir, r, half) {

  function updateCone() {

  // ---- антена: сектор покриття з урахуванням рельєфу (онлайн Terrain-RGB) ----
  const DEM_Z = 12;
  const ANT_COLORS = ['#1f5fb8', '#1f7a1f', '#b8431f', '#7a1f7a', '#1f7a7a', '#9a7d0a'];
  const tileData = new Map();
  let antLayer = null, antennas = [];
  function lon2tile(lon, z) { return (lon + 180) / 360 * Math.pow(2, z); }
  function lat2tile(lat, z) { const r = lat * Math.PI / 180; return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z); }
  function getTile(z, x, y) {
    const key = z + '/' + x + '/' + y;
    if (tileData.has(key)) return Promise.resolve();
    return new Promise((res, rej) => {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        try {
          const c = document.createElement('canvas'); c.width = 256; c.height = 256;
          c.getContext('2d').drawImage(img, 0, 0);
          tileData.set(key, c.getContext('2d').getImageData(0, 0, 256, 256).data); res();
        } catch (e) { rej(e); }
      };
      img.onerror = () => rej(new Error('tile'));
      img.src = 'https://s3.amazonaws.com/elevation-tiles-prod/terrarium/' + z + '/' + x + '/' + y + '.png';
    });
  }
  async function demPrefetch(latC, lngC, rangeM) {
    const dLat = rangeM / 111320, dLng = rangeM / (111320 * Math.cos(latC * Math.PI / 180)), z = DEM_Z;
    const xs = [Math.floor(lon2tile(lngC - dLng, z)), Math.floor(lon2tile(lngC + dLng, z))];
    const ys = [Math.floor(lat2tile(latC + dLat, z)), Math.floor(lat2tile(latC - dLat, z))];
    const jobs = [];
    for (let x = Math.min(...xs); x <= Math.max(...xs); x++)
      for (let y = Math.min(...ys); y <= Math.max(...ys); y++) jobs.push(getTile(z, x, y));
    await Promise.all(jobs);
  }
  function elevSync(lat, lng) {
    const z = DEM_Z, xf = lon2tile(lng, z), yf = lat2tile(lat, z);
    const x = Math.floor(xf), y = Math.floor(yf);
    const d = tileData.get(z + '/' + x + '/' + y); if (!d) return null;
    const px = Math.min(255, Math.floor((xf - x) * 256)), py = Math.min(255, Math.floor((yf - y) * 256));
    const i = (py * 256 + px) * 4;
    return (d[i] * 256 + d[i + 1] + d[i + 2] / 256) - 32768;
  }
  // межа прямої видимості по кожному азимуту з кривизною 4/3 + Френель
  async function buildSector(lat, lng, azC, half, range, antH, tgtH, freq) {
    await demPrefetch(lat, lng, range);
    const k = 1.33, R = 6371000, lam = freq > 0 ? 299792458 / (freq * 1e6) : 0;
    const g0 = elevSync(lat, lng); if (g0 == null) return null;
    const Hobs = g0 + antH, step = Math.max(30, range / 300);
    const pts = [[lat, lng]];
    for (let az = azC - half; az <= azC + half + 0.001; az += Math.max(2, half / 12)) {
      const A = (az + 360) % 360;
      let maxAng = -Infinity, reach = range;
      for (let d = step; d <= range; d += step) {
        const p = destPoint(lat, lng, A, d);
        const t = elevSync(p[0], p[1]); if (t == null) { reach = d - step; break; }
        const curv = d * d / (2 * k * R);
        const fres = lam > 0 ? 0.6 * Math.sqrt(lam * d * Math.max(1, range - d) / range) : 0;
        const angTerr = ((t + fres - curv) - Hobs) / d;   // перешкода (із запасом Френеля)
        const angTgt = ((t + tgtH - curv) - Hobs) / d;    // ціль на цій дальності
        if (angTgt < maxAng) { reach = d - step; break; }
        if (angTerr > maxAng) maxAng = angTerr;
      }
      pts.push(destPoint(lat, lng, A, Math.max(step, reach)));
    }
    return pts;
  }
  $('#antbuild').addEventListener('click', async () => {
    if (!lmarker || !pickedCoords) { $('#mapcoords').textContent = 'Спочатку постав точку'; return; }
    const az = coneDir();

  $('#reset').addEventListener('click', () => {
    if (!resetArmed) {
      resetArmed = true;
      $('#reset').textContent = 'Підтвердити скидання?';
      status('Натисніть ще раз, щоб обнулити зміну.', 'dim');
      resetTimer = setTimeout(() => { resetArmed = false; $('#reset').textContent = 'Скинути зміну'; }, 4000);
      return;
    }
    clearTimeout(resetTimer); resetArmed = false;
    $('#reset').textContent = 'Скинути зміну';
    flights = []; activeRec = null; saveFlights(); renderStats();
    status('✓ Зміну скинуто', 'ok');
  });

  // ---- сохранение перед обновлением/закрытием страницы ----
  function flush() {
    const f = JSON.stringify(flights);
    const nm = $('#callsign').value;
    store.set('kap_flights', f); store.set('kap_name', nm); store.set('kap_reportmode', reportMode);
    idbSet('kap_flights', flights); idbSet('kap_name', nm); idbSet('kap_reportmode', reportMode);
  }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flush(); });
  window.addEventListener('pagehide', flush);
  window.addEventListener('beforeunload', flush);

  // ---- загрузка из IndexedDB (приоритет у более полной записи) ----
  (async function initDB() {
    try {
      const [f, nm, rm] = await Promise.all([idbGet('kap_flights'), idbGet('kap_name'), idbGet('kap_reportmode')]);
      const tpl = await idbGet('kap_templates');
      if (Array.isArray(f) && f.length >= flights.length) {
        flights = f.map(x => ({ t: x.t, c: x.c || '', lt: x.lt }));
      }
      if (Array.isArray(tpl) && !store.get('kap_templates')) { templates = tpl; renderTemplates(); }
      if (typeof nm === 'string' && !store.get('kap_name')) $('#callsign').value = nm;
      if (typeof rm === 'string' && store.get('kap_reportmode') == null) setMode(rm);
    } catch (e) {}
    nameToggleLabel(); saveFlights(); renderStats();
  })();

  saveFlights(); renderStats();
  setInterval(() => { saveFlights(); renderStats(); }, 60000);
</script>
</body>
</html>
